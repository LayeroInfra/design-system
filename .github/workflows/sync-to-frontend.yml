name: Sync primitives to frontend

# design-system is the single source of truth for the ui/* primitives. On every
# push to main that touches them, open a PR in LayeroInfra/frontend mirroring the
# canonical files into control-plane. Review & merge there to ship.
#
# Requires a repo secret FRONTEND_SYNC_TOKEN — a PAT (classic: `repo` + `workflow`,
# or fine-grained: Contents + Pull requests: write) on LayeroInfra/frontend.

on:
  push:
    branches: [main]
    paths:
      - "src/components/ui/**"
      - "src/lib/utils.ts"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout design-system
        uses: actions/checkout@v4
        with:
          path: ds

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: LayeroInfra/frontend
          token: ${{ secrets.FRONTEND_SYNC_TOKEN }}
          path: frontend

      - name: Mirror primitives (exclude stories)
        run: |
          set -euo pipefail
          dst="frontend/control-plane/src/components/ui"
          mkdir -p "$dst"
          find ds/src/components/ui -maxdepth 1 -type f \
            \( -name '*.tsx' -o -name '*.ts' \) ! -name '*.stories.tsx' \
            -exec cp {} "$dst"/ \;
          cp ds/src/lib/utils.ts frontend/control-plane/src/lib/utils.ts

      - name: Open PR to frontend
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.FRONTEND_SYNC_TOKEN }}
          path: frontend
          branch: design-system-sync
          delete-branch: true
          title: "chore(ui): sync primitives from design-system"
          commit-message: "chore(ui): sync primitives from design-system"
          body: |
            Automated mirror of the canonical UI primitives from
            [design-system](https://github.com/LayeroInfra/design-system)
            @ `${{ github.sha }}`.

            Files: `control-plane/src/components/ui/*` + `lib/utils.ts`.
            Review the diff and merge to ship.
